name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-typecheck-build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true  # Pre-existing lint issues — non-blocking until cleanup

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          HOSTAWAY_MODE: mock
          MONGODB_URI: mongodb://ci-placeholder/priceos
          JWT_SECRET: ci_jwt_secret_minimum_32_characters_long
          LYZR_API_KEY: sk-ci-placeholder
          LYZR_API_URL: https://agent-prod.studio.lyzr.ai/v3/inference/chat/
